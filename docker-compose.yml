version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./model.joblib:/app/model.joblib
    depends_on:
      - mlflow

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install streamlit requests --quiet &&
             streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api

  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    volumes:
      - mlflow_data:/mlflow
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri sqlite:///mlflow.db
             --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"

volumes:
  mlflow_data:
